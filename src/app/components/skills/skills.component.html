<section class="section">
  <div class="container">
    <h2>{{ translations.skills.title }}</h2>
    <div class="grid-container skills-grid">
      <div class="card skills-card" *ngFor="let skill of skills">
        <h3>{{ skill.name }}</h3>
        <p class="skills-description">{{ skill.description }}</p>
        <span class="experience" *ngIf="skill.experience">{{ skill.experience }}</span>
      </div>
    </div>
  </div>
</section>
