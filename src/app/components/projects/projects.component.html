<section class="section">
  <div class="container">
    <h2>{{ translations.projects.title }}</h2>

    <div class="grid-container">
      <div class="card" *ngFor="let project of projects">
        <h3>{{ project.name }}</h3>
        <p>{{ project.description }}</p>
        <p class="technology"><strong>Technology:</strong> {{ project.technology }}</p>
      </div>
    </div>
  </div>
</section>
